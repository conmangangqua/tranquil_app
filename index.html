<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Android Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      background: #f5f6fa;
      margin: 0;
      padding: 24px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .app-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      position: relative;
    }

    .app-icon img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
    }

    .platform-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 12px;
      background: #e3f2fd;
      color: #1976d2;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .app-title {
      margin: 12px 0 4px;
      font-size: 18px;
    }

    .app-description {
      color: #555;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .feature-tag {
      display: inline-block;
      background: #f1f3f4;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin: 2px;
    }

    .button-group {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .install-button {
      text-decoration: none;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      color: #fff;
    }

    .install-button.dev { background: #6c757d; }
    .install-button.live { background: #28a745; }
    .install-button.aab { background: #fd7e14; }
  </style>
</head>

<body>
  <h1>📱 Android Apps</h1>
  <div class="app-grid" id="appGrid"></div>

  <script>
    fetch("apps.json")
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById("appGrid")

        data.apps.forEach(app => {
          const features = (app.features || [])
            .map(f => `<span class="feature-tag">${f}</span>`)
            .join("")

          const html = `
            <div class="app-card">
              <span class="platform-badge">${app.platform || "Android"}</span>

              <div class="app-icon">
                <img src="${app.icon || ""}" alt="${app.name || ""}" onerror="this.style.display='none'">
              </div>

              <h2 class="app-title">${app.name || ""}</h2>
              <p class="app-description">${app.description || ""}</p>

              ${features ? `<div class="app-features">${features}</div>` : ""}

              <div class="button-group">
                ${app.downloads?.dev ? `<a class="install-button dev" href="${app.downloads.dev}">🔧 Dev</a>` : ""}
                ${app.downloads?.prod ? `<a class="install-button live" href="${app.downloads.prod}">🚀 Live</a>` : ""}
                ${app.downloads?.aab ? `<a class="install-button aab" href="${app.downloads.aab}">📦 AAB</a>` : ""}
              </div>
            </div>
          `
          grid.insertAdjacentHTML("beforeend", html)
        })
      })
      .catch(err => {
        document.body.innerHTML = "<h2>❌ Không load được apps.json</h2>"
        console.error(err)
      })
  </script>
</body>
</html>
