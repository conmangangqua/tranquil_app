  <script>/* LUCIDE_RETRY: gọi createIcons() bền vững — chống race condition khi lucide.js chưa load */
    window.tryRenderIcons = function(retries) {
      if (window.lucide && typeof lucide.createIcons === 'function') {
        try { lucide.createIcons(); } catch(_) {}
        return;
      }
      if ((retries || 0) > 50) return; // ~5s timeout
      setTimeout(function(){ window.tryRenderIcons((retries || 0) + 1); }, 100);
    };
    window.addEventListener('load', function(){ window.tryRenderIcons(); });

  <script>
    let allApps = [];
    const formatUrl = (url, isIOS) => url && isIOS ? "itms-services://?action=download-manifest&url=" + encodeURIComponent(url) : url;
    const renderApps = (apps) => {
      const container = document.getElementById("appContainer"); container.innerHTML = "";
      if (apps.length === 0) { container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-muted); font-weight: 700;">🍃 No apps found matching your search.</div>'; return; }
      apps.forEach((app, index) => {
        const isIOS = (app.platform || "").toLowerCase().includes("ios");
        const isAndroid = !app.platform || app.platform.toLowerCase().includes("android");
        const buildLabel = (isIOS && !isAndroid) ? "Build TestFlight" : "Build AAB";
        const devUrl = formatUrl(app.downloads?.dev, isIOS);
        const prodUrl = formatUrl(app.downloads?.prod, isIOS);
        const aabUrl = app.downloads?.aab || "";
        const storeUrl = app.store || "";
        const v = app.versions || {};
        const stack = (label, k) => v[k]
          ? `<span class="btn-stack">${label}<span class="ver">v${v[k]}</span></span>`
          : `<span class="btn-stack">${label}</span>`;
        const card = document.createElement("article"); card.className = "app-card"; card.style.animationDelay = `${index * 0.1}s`; card.dataset.appId = app.id;
        card.innerHTML = `<div class="app-icon-box"><img src="${app.icon || 'https://via.placeholder.com/150'}" class="app-icon" alt="${app.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(app.name)}&background=059669&color=fff'"></div>
          <div class="badge-row"><span class="badge ${isIOS ? 'ios' : 'android'}"><i data-lucide="${isIOS ? 'apple' : 'smartphone'}"></i>${app.platform || 'Android'}</span><span class="ads-badge" data-ads="loading" style="display:none"></span><span class="health-badge" data-health="loading" style="display:none"></span></div>
          <h2 class="app-title">${app.name}</h2><p class="app-desc">${app.description || ''}</p>
          <div class="btn-grid">${devUrl ? `<a href="${devUrl}" class="btn btn-dev"><i class="btn-ic" data-lucide="wrench"></i>${stack('Dev Build','dev')}</a>` : ""} ${prodUrl ? `<a href="${prodUrl}" class="btn btn-live"><i class="btn-ic" data-lucide="rocket"></i>${stack('Live Build','prod')}</a>` : ""} ${aabUrl ? `<a href="${aabUrl}" class="btn btn-full"><i class="btn-ic" data-lucide="package"></i>${stack('Download AAB','aab')}</a>` : ""} ${storeUrl ? `<a href="${storeUrl}" target="_blank" rel="noopener" class="btn btn-store"><i class="btn-ic" data-lucide="shopping-bag"></i><span class="btn-stack">View on Store</span></a>` : ""}
          <button type="button" class="btn btn-build" onclick="openBuildModal('${app.id}', '${(app.name || '').replace(/'/g, "\\'")}')"><i class="btn-ic" data-lucide="hammer"></i><span class="btn-stack">${buildLabel}</span></button><button type="button" class="btn btn-gd" onclick="openViewDesc('${app.id}', '${(app.name || '').replace(/'/g, "\'")}')"><i class="btn-ic" data-lucide="file-text"></i><span class="btn-stack">Description</span></button><button type="button" class="btn btn-as" onclick="dlAssets('${app.id}', '${(app.name || '').replace(/'/g, "\'")}', this)"><i class="btn-ic" data-lucide="download"></i><span class="btn-stack">Assets</span></button><button type="button" class="btn btn-ba" onclick="genBaDocs('${app.id}', '${(app.name || '').replace(/'/g, "\'")}', this)"><i class="btn-ic" data-lucide="clipboard-list"></i><span class="btn-stack">BA + Tests</span></button></div>`;
        container.appendChild(card);
      });
    };
    const filterApps = () => {
      const query = document.getElementById("searchInput").value.toLowerCase();
      renderApps(allApps.filter(app => app.name.toLowerCase().includes(query) || (app.description && app.description.toLowerCase().includes(query))));
      tryRenderIcons();
    };
    fetch("apps.json").then(res => res.json()).then(data => { allApps = data.apps || []; allApps.sort((a,b) => (b.store ? 1 : 0) - (a.store ? 1 : 0)); renderApps(allApps); tryRenderIcons(); runHealthCheck(); enrichCardDescriptions(); }).catch(err => { document.getElementById("appContainer").innerHTML = '<div style="color: #ef4444; font-weight: 800; text-align: center; grid-column: 1/-1;">❌ Connection error. Please try again later.</div>'; });

    function escHtml(s){ return String(s||"").replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];}); }
    function urlRow(label, url, ok){
      if(!url) return '<div style="font-size:.7rem;color:#94a3b8">'+label+': <i>(trống)</i></div>';
      const okBadge = ok===true ? '<span style="color:#16a34a;font-weight:700">✓</span>'
                    : ok===false ? '<span style="color:#dc2626;font-weight:800">⚠️ HỎNG</span>'
                    : '<span style="color:#94a3b8">?</span>';
      const safe = escHtml(url);
      const color = ok===false ? "#dc2626" : "#7c3aed";
      return '<div style="font-size:.7rem;line-height:1.4;margin-top:2px"><span style="color:#64748b;font-weight:600">'+label+'</span> '+okBadge+'<br><a href="'+safe+'" target="_blank" rel="noopener" style="color:'+color+';word-break:break-all;text-decoration:underline">'+safe+'</a></div>';
    }
    function clearHealthUI(){
      document.querySelectorAll(".health-badge, .ads-badge").forEach(b => { b.style.display="none"; b.textContent=""; });
      document.querySelectorAll(".health-urls").forEach(u => u.remove());
      document.querySelectorAll(".app-card").forEach(c => { c.style.boxShadow=""; });
    }
    async function runAdsCheck(){
      if(!allApps.length) return;
      const apps = allApps.filter(a => a.id).slice(0, 50).map(a => ({id: a.id}));
      try{
        const r = await fetch("https://aab.tranquilmind.co/api/adscheck", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({apps})
        });
        if(!r.ok) return;
        const data = await r.json();
        Object.entries(data.results || {}).forEach(([appId, a]) => {
          const card = document.querySelector('.app-card[data-app-id="'+CSS.escape(appId)+'"]');
          if(!card) return;
          const badge = card.querySelector('.ads-badge');
          if(!badge) return;
          badge.className = "ads-badge " + (a.has_ads ? "has-ads" : "no-ads");
          badge.style.display = "inline-flex";
          if(a.has_ads){

            const sdks = (a.ads||[]).join(', ');

            badge.innerHTML = '<i data-lucide="megaphone"></i>ADS';

            badge.style.cursor = 'pointer';

            badge.title = 'Click để xem SDK chi tiết';

            badge.onclick = function(){ alert('Ads SDK: ' + sdks); };

          } else {

            badge.innerHTML = '<i data-lucide="ban"></i>No Ads';

            badge.style.cursor = 'default';

            badge.onclick = null;

          }
          tryRenderIcons();
        });
      }catch(e){}
    }
    async function runHealthCheck(){
      runAdsCheck();
      if(localStorage.getItem("aab_authed")!=="1"){ clearHealthUI(); return; }
      if(!allApps.length) return;
      const apps = allApps.filter(a => a.id).slice(0, 50).map(a => ({id: a.id, store_url: a.store || null}));
      try{
        const r = await fetch("https://aab.tranquilmind.co/api/healthbulk", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({apps})
        });
        if(!r.ok) return;
        const data = await r.json();
        Object.entries(data.results || {}).forEach(([appId, h]) => {
          const card = document.querySelector('.app-card[data-app-id="'+CSS.escape(appId)+'"]');
          if(!card) return;
          const badge = card.querySelector('.health-badge');
          if(badge){
            const broken = h.has_desc && (h.privacy_ok===false || h.terms_ok===false);
            if(broken){
              badge.style.display="inline-flex";
              badge.style.cssText += "background:#fef2f2;color:#dc2626;font-size:.65rem;font-weight:800;padding:3px 8px;border-radius:8px;align-items:center;gap:3px;border:1px solid #fecaca";
              const parts = [];
              if(h.privacy_ok===false) parts.push("Privacy");
              if(h.terms_ok===false) parts.push("Terms");
              badge.textContent="⚠️ "+parts.join("+")+" URL 404";
              card.style.boxShadow="0 0 0 2px #fecaca, 0 8px 20px rgba(220,38,38,.15)";
            }
          }
          // Store URL 404: hide "View on Store" button + show "Update Store Link"
          if(h.store_url && h.store_ok===false){
            card.classList.add("store-broken");
            const storeBtn = card.querySelector('.btn-store');
            if(storeBtn) storeBtn.style.display="none";
            const addBtn = card.querySelector('.btn-addstore');
            if(addBtn){
              addBtn.setAttribute("data-has-store","0");
              const stack = addBtn.querySelector('.btn-stack');
              if(stack) stack.textContent="Update Store Link (URL 404)";
            }
          } else if(h.store_url && h.store_ok===true){
            card.classList.add("store-live");
          }
          // Chỉ inject URL block nếu CÓ URL hỏng (không hiển thị khi OK)
          if(h.has_desc){
            const privacyBad = h.privacy_url && h.privacy_ok===false;
            const termsBad = h.terms_url && h.terms_ok===false;
            const privacyMissing = !h.privacy_url;
            const termsMissing = !h.terms_url;
            const needShow = privacyBad || termsBad || privacyMissing || termsMissing;
            const descEl = card.querySelector('.app-desc');
            if(descEl && needShow && !card.querySelector('.health-urls')){
              const wrap = document.createElement("div");
              wrap.className="health-urls";
              wrap.style.cssText="margin:6px 0 10px;padding:8px 10px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px";
              let html="";
              if(privacyBad || privacyMissing) html += urlRow("Privacy", h.privacy_url, h.privacy_ok);
              if(termsBad || termsMissing) html += urlRow("Terms", h.terms_url, h.terms_ok);
              wrap.innerHTML = html;
              descEl.after(wrap);
            }
          }
        });
        // Re-sort cards: store-live → có store field → store-broken → no store
        const container = document.getElementById("appContainer");
        const cardsToSort = Array.from(container.querySelectorAll(".app-card"));
        cardsToSort.sort((a, b) => {
          const score = (el) => {
            if (el.classList.contains("store-live")) return 3;
            if (el.classList.contains("store-broken")) return 1;
            const id = el.dataset.appId;
            const app = allApps.find(x => x.id === id);
            return (app && app.store) ? 2 : 0;
          };
          return score(b) - score(a);
        });
        cardsToSort.forEach(c => container.appendChild(c));
      }catch(e){ /* silent */ }
    }
    window.runHealthCheck = runHealthCheck;

    // Card-level description enricher — dual source:
    //   1. /api/description (Vercel → reads từ GitLab source).
    //   2. raw.githubusercontent.com/conmangangqua/app_description (đã gen sẵn).
    // Normalize slug bằng strip-non-alphanum để khớp tên có thể khác underscore/dash.
    // Cache 24h trong localStorage.
    async function enrichCardDescriptions(){
      const CACHE_KEY = "hubDescCache_v3";
      const CACHE_TTL = 24*3600*1000;
      let cache = {};
      try { cache = JSON.parse(localStorage.getItem(CACHE_KEY)||"{}"); } catch(_) { cache = {}; }
      const now = Date.now();

      // ---- One-shot: build slug index từ GitHub app_description tree ----
      let ghIndex = cache.__ghIndex && cache.__ghIndex.t > now - CACHE_TTL ? cache.__ghIndex.idx : null;
      if (!ghIndex){
        ghIndex = {};
        try {
          const tr = await fetch("https://api.github.com/repos/conmangangqua/app_description/git/trees/main?recursive=1", { cache: "no-store" });
          if (tr.ok){
            const td = await tr.json();
            const normalize = (s) => String(s||"").toLowerCase().replace(/[-_]/g, "");
            for (const it of (td.tree||[])){
              if (it.type !== "blob") continue;
              const m = it.path.match(/^(apple|google)\/([^\/]+)\/([^\/]+)\/short_description\.txt$/);
              if (!m) continue;
              const slug = m[3];
              const norm = normalize(slug);
              // prefer "google" entries when both exist (Sếp mostly ships Android)
              if (!ghIndex[norm] || m[1] === "google") ghIndex[norm] = it.path;
            }
            cache.__ghIndex = { idx: ghIndex, t: now };
          }
        } catch(_) { /* if tree fetch fails, fall back to api/description only */ }
      }
      const normalize = (s) => String(s||"").toLowerCase().replace(/[-_]/g, "");

      const queue = [];
      document.querySelectorAll(".app-card").forEach(card => {
        const id = card.dataset.appId; if(!id) return;
        const el = card.querySelector(".app-desc"); if(!el) return;
        const entry = cache[id];
        if (entry && entry.s && entry.t > now - CACHE_TTL){
          if (entry.s && !el.textContent.trim()) el.textContent = entry.s;
          return;
        }
        queue.push(id);
      });

      async function fetchOne(id){
        // Source 1: Vercel /api/description (GitLab-backed)
        let s = "";
        try {
          const r = await fetch("https://aab.tranquilmind.co/api/description?app_id="+encodeURIComponent(id));
          if (r.ok){
            const d = await r.json();
            if (d && d.exists && d.short) s = d.short;
          }
        } catch(_){}
        // Source 2: GitHub app_description raw (fallback)
        if (!s && ghIndex){
          const path = ghIndex[normalize(id)];
          if (path){
            try {
              const r = await fetch("https://raw.githubusercontent.com/conmangangqua/app_description/main/"+path);
              if (r.ok){
                const txt = (await r.text()).trim();
                if (txt) s = txt;
              }
            } catch(_){}
          }
        }
        if (s) cache[id] = { s: s, t: now };
        if (s){
          const card = document.querySelector(".app-card[data-app-id=\""+(window.CSS&&CSS.escape?CSS.escape(id):id)+"\"]");
          if (card){
            const el = card.querySelector(".app-desc");
            if (el && !el.textContent.trim()) el.textContent = s;
          }
        }
      }

      const POOL = 5;
      for (let i=0; i<queue.length; i+=POOL){
        const batch = queue.slice(i, i+POOL);
        await Promise.all(batch.map(fetchOne));
      }
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(_) {}
    }
    window.enrichCardDescriptions = enrichCardDescriptions;

  </script>

  <script>
    const BUILD_API = "https://aab.tranquilmind.co";
    let bmAppId = "";
    const $ = (id) => document.getElementById(id);

    async function openBuildModal(appId, appName) {
      bmAppId = appId;
      $("bmTitle").innerHTML = '<i data-lucide="hammer" style="width:18px;height:18px;vertical-align:-3px;margin-right:6px"></i>Build';
      $("bmApp").textContent = appName + " — kích build từ xa";
      $("bmName").value = ""; $("bmCode").value = ""; $("bmPin").value = "";
      $("bmStatus").textContent = "Đang lấy version hiện tại...";
      $("bmOk").disabled = true;
      $("buildModal").classList.add("open");
      try {
        const r = await fetch(`${BUILD_API}/api/version?app_id=${encodeURIComponent(appId)}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || "Không lấy được version");
        $("bmTitle").innerHTML = '<i data-lucide="hammer" style="width:18px;height:18px;vertical-align:-3px;margin-right:6px"></i>Build ' + (d.build_label || "");
        tryRenderIcons();
        $("bmApp").textContent = appName + " — " + (d.platform === "ios" ? "iOS TestFlight" : "Android AAB");
        $("bmName").value = d.version_name || "";
        $("bmCode").value = d.suggested_code || d.version_code || "";
        $("bmStatus").style.color = "var(--text-muted)";
        $("bmStatus").textContent = `Hiện tại: ${d.current_name}+${d.current_code} → đề xuất code mới: ${d.suggested_code}`;
      } catch (e) {
        $("bmStatus").style.color = "#ef4444";
        $("bmStatus").textContent = "⚠️ " + e.message;
      } finally {
        $("bmOk").disabled = false;
      }
    }

    function closeBuildModal() { $("buildModal").classList.remove("open"); }

    async function submitBuild() {
      const payload = {
        app_id: bmAppId,
        version_name: $("bmName").value.trim(),
        version_code: $("bmCode").value.trim(),
        pin: $("bmPin").value.trim(),
      };
      if (!payload.version_name || !payload.version_code || !payload.pin) {
        $("bmStatus").style.color = "#ef4444";
        $("bmStatus").textContent = "⚠️ Điền đủ Version Name, Code và PIN.";
        return;
      }
      $("bmOk").disabled = true;
      $("bmStatus").style.color = "var(--text-muted)";
      $("bmStatus").textContent = "⏳ Đang kích build...";
      try {
        const r = await fetch(`${BUILD_API}/api/build`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || "Build thất bại");
        $("bmStatus").style.color = "var(--primary)";
        closeBuildModal(); showSnack("✅ " + (d.message || "Đã kích build"), d.pipeline_url, false);
      } catch (e) {
        $("bmStatus").style.color = "#ef4444";
        $("bmStatus").textContent = "❌ " + e.message;
      } finally {
        $("bmOk").disabled = false;
      }
    }

    $("buildModal").addEventListener("click", (e) => {
      if (e.target.id === "buildModal") closeBuildModal();
    });
  </script>

  <script>(function(){
    var API="https://aab.tranquilmind.co", KEY="aab_authed";
    var b=document.body,
        btn=document.getElementById("aablBtn"),
        ov=document.getElementById("aablOv"),
        pin=document.getElementById("aablPin"),
        msg=document.getElementById("aablMsg"),
        ok=document.getElementById("aablOk"),
        cancel=document.getElementById("aablCancel");
    function authed(){return localStorage.getItem(KEY)==="1";}
    function render(){ if(authed()){b.classList.add("aab-authed");btn.innerHTML='<i data-lucide="log-out" style="width:14px;height:14px;vertical-align:-2px;margin-right:5px"></i>Đăng xuất';} else {b.classList.remove("aab-authed");btn.innerHTML='<i data-lucide="lock-keyhole" style="width:14px;height:14px;vertical-align:-2px;margin-right:5px"></i>Đăng nhập';} tryRenderIcons(); }
    function close(){ov.classList.remove("open");pin.value="";msg.textContent="";}
    btn.onclick=function(){ if(authed()){ localStorage.removeItem(KEY); render(); window.runHealthCheck && window.runHealthCheck(); } else { ov.classList.add("open"); setTimeout(function(){pin.focus();},50); } };
    cancel.onclick=close;
    ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    pin.addEventListener("keydown",function(e){ if(e.key==="Enter") ok.click(); });
    ok.onclick=async function(){
      var v=(pin.value||"").trim();
      if(!v){ msg.style.color="#ef4444"; msg.textContent="Nhập PIN."; return; }
      ok.disabled=true; msg.style.color="#64748b"; msg.textContent="Đang kiểm tra...";
      try{
        var r=await fetch(API+"/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin:v})});
        var d=await r.json();
        if(!r.ok||!d.ok) throw new Error(d.error||"Sai mã PIN");
        localStorage.setItem(KEY,"1"); render(); close(); window.runHealthCheck && window.runHealthCheck();
      }catch(e){ msg.style.color="#ef4444"; msg.textContent="❌ "+e.message; }
      finally{ ok.disabled=false; }
    };
    render();
  })();</script>

  <script>(function(){
    var API="https://aab.tranquilmind.co", appId="";
    var ov=document.getElementById("vdOv"),appEl=document.getElementById("vdApp"),
        platEl=document.getElementById("vdPlat"),
        fieldsEl=document.getElementById("vdFields"),
        pin=document.getElementById("vdPin"),msg=document.getElementById("vdMsg"),
        gb=document.getElementById("vdGenBtn");

    // Appstore (iOS) field order + display labels + Apple char limits
    var APPSTORE_LAYOUT=[
      {key:"app_name",      label:"App Name",         limit:30},
      {key:"subtitle",      label:"Subtitle",         limit:30},
      {key:"promotional_text",label:"Promotional Text",limit:170},
      {key:"description",   label:"Description",      limit:4000},
      {key:"keywords",      label:"Keywords",         limit:100},
      {key:"whats_new",     label:"What's New",       limit:4000},
      {key:"category",      label:"Category"},
      {key:"content_rating",label:"Content Rating"},
      {key:"privacy_url",   label:"Privacy URL"},
      {key:"terms_url",     label:"Terms URL"},
      {key:"copyright",     label:"Copyright"}
    ];

    function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];}); }

    function doCopy(text,btn){
      function done(){ var o=btn.textContent; btn.textContent="Đã copy ✓"; setTimeout(function(){btn.textContent=o;},1500); }
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(done).catch(function(){fb(text,done);});
      } else fb(text,done);
    }
    function fb(t,cb){
      var ta=document.createElement("textarea"); ta.value=t;
      ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{ document.execCommand("copy"); cb(); }catch(e){} document.body.removeChild(ta);
    }
    // Expose for any legacy callers
    window.vdCopy=function(kind,btn){
      var t=(document.getElementById("vdf_"+kind)||{}).textContent||"";
      doCopy(t,btn);
    };

    function renderRow(label, value, limit, urlStatus){
      var len=(value||"").length;
      var meta=limit?(" <span style=\"font-size:.7rem;color:"+(len>limit?"#ef4444":"#94a3b8")+";font-weight:600\">"+len+"/"+limit+"</span>"):"";
      var safeLabel=escapeHtml(label);
      var key=label.toLowerCase().replace(/[^a-z0-9]+/g,"_");
      var trimmedVal=(value||"").trim();
      var isUrl=/^https?:\/\//i.test(trimmedVal);
      var safeVal;
      var dataRaw="";
      var statusBadge="";
      if(isUrl){
        var safeHref=escapeHtml(trimmedVal);
        // URL health badge: green ✓ if 200, red ⚠ if 404/403/error
        if(urlStatus){
          if(urlStatus.ok){
            statusBadge=' <span style="font-size:.7rem;color:#16a34a;font-weight:700">✓ '+urlStatus.status+'</span>';
          } else {
            var st=urlStatus.status?String(urlStatus.status):(urlStatus.error||"unreachable");
            statusBadge=' <span style="font-size:.7rem;color:#ef4444;font-weight:700;background:#fef2f2;padding:2px 6px;border-radius:4px">⚠️ '+escapeHtml(st)+'</span>';
          }
        }
        safeVal='<a href="'+safeHref+'" target="_blank" rel="noopener noreferrer" style="color:#7c3aed;font-weight:700;word-break:break-all;text-decoration:underline">'+safeHref+' ↗</a>';
        dataRaw=' data-raw="'+safeHref+'"';
      } else {
        safeVal=escapeHtml(trimmedVal||"(trống)");
      }
      return '<div class="lbrow"><span class="lb">'+safeLabel+meta+statusBadge+'</span>'+
             '<button type="button" class="cp" data-cp="'+key+'">Copy</button></div>'+
             '<div class="box" id="vdf_'+key+'"'+dataRaw+'>'+safeVal+'</div>';
    }

    // Track current data for legal-gen UI
    var currentDescData=null;
    function hasBrokenUrls(d){
      var s=d&&d.urls_status||{};
      return ["privacy_url","terms_url"].some(function(k){
        var f=(d.fields||{})[k];
        return !f || (s[k] && !s[k].ok);
      });
    }

    function renderAppstore(d){
      platEl.textContent="🍎 Apple App Store";
      var f=d.fields||{};
      var s=d.urls_status||{};
      var html="";
      APPSTORE_LAYOUT.forEach(function(r){
        if(!(r.key in f) && r.key!=="app_name" && r.key!=="description") return;
        html+=renderRow(r.label, f[r.key]||"", r.limit||0, s[r.key]);
      });
      fieldsEl.innerHTML=html||"(Chưa có dữ liệu)";
      attachCopy();
      updateLegalBtn(d);
    }

    var GOOGLE_LAYOUT=[
      {key:"app_name",          label:"Title",             limit:50},
      {key:"short_description", label:"Short description", limit:80},
      {key:"full_description",  label:"Long description",  limit:4000},
      {key:"release_notes",     label:"Release notes",     limit:500},
      {key:"category",          label:"Category"},
      {key:"content_rating",    label:"Content Rating"},
      {key:"privacy_url",       label:"Privacy URL"},
      {key:"terms_url",         label:"Terms URL"},
      {key:"copyright",         label:"Copyright"}
    ];
    function renderGoogle(d){
      platEl.textContent="🤖 Google Play";
      var f=d.fields||{};
      var s=d.urls_status||{};
      if(!f.short_description && d.short) f.short_description=d.short;
      if(!f.full_description && d.long) f.full_description=d.long;
      var html="";
      GOOGLE_LAYOUT.forEach(function(r){
        if(!(r.key in f) && r.key!=="short_description" && r.key!=="full_description") return;
        html+=renderRow(r.label, f[r.key]||"", r.limit||0, s[r.key]);
      });
      fieldsEl.innerHTML=html||"(Chưa có dữ liệu)";
      attachCopy();
      updateLegalBtn(d);
    }

    function attachCopy(){
      fieldsEl.querySelectorAll(".cp").forEach(function(b){
        b.addEventListener("click",function(){
          var box=document.getElementById("vdf_"+b.getAttribute("data-cp"));
          var t=(box&&box.getAttribute("data-raw"))||(box&&box.textContent)||"";
          doCopy(t,b);
        });
      });
    }

    function updateLegalBtn(d){
      currentDescData=d;
      var btn=document.getElementById("vdGenLegalBtn");
      if(!btn) return;
      if(hasBrokenUrls(d)){
        btn.style.display="block";
        btn.innerHTML='<i data-lucide="refresh-cw" style="width:14px;height:14px;vertical-align:-2px;margin-right:5px"></i>Gen Privacy/Terms (URL hỏng)';
        tryRenderIcons();
      } else {
        btn.style.display="none";
      }
    }

    window.openViewDesc=async function(id,nm){
      appId=id; appEl.textContent=nm; pin.value=""; msg.textContent="";
      platEl.textContent="";
      fieldsEl.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px">'+
        '<div class="vd-spin"></div>'+
        '<div style="color:#7c3aed;font-weight:700;font-size:.92rem">Đang tải mô tả từ GitHub…</div>'+
        '<div style="color:#94a3b8;font-size:.78rem">Đang kiểm tra Privacy/Terms URL…</div>'+
        '</div>';
      gb.disabled=true;
      var lb=document.getElementById("vdGenLegalBtn"); if(lb) lb.disabled=true;
      ov.classList.add("open");
      try{
        var r=await fetch(API+"/api/description?app_id="+encodeURIComponent(id));
        var d=await r.json();
        if(!r.ok) throw new Error(d.error||"Không tải được");
        if(!d.exists){
          platEl.textContent=(d.platform==="appstore"?"🍎 Apple App Store":"🤖 Google Play");
          fieldsEl.innerHTML="<div class=\"box\">(Chưa có — bấm Gen lại để tạo)</div>";
          return;
        }
        if(d.platform==="appstore") renderAppstore(d);
        else renderGoogle(d);
      }catch(e){ fieldsEl.innerHTML="<div class=\"box\">⚠️ "+escapeHtml(e.message)+"</div>"; }
      finally{ gb.disabled=false; if(lb) lb.disabled=false; }
    };
    window.vdClose=function(){ ov.classList.remove("open"); };
    ov.addEventListener("click",function(e){ if(e.target===ov) vdClose(); });
    window.vdGen=async function(){
      var v=(pin.value||"").trim();
      if(!v){ msg.style.color="#ef4444"; msg.textContent="Nhập PIN để Gen lại."; return; }
      gb.disabled=true; msg.style.color="#64748b"; msg.textContent="⏳ Đang kích gen…";
      try{
        var r=await fetch(API+"/api/gendesc",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({app_id:appId,pin:v})});
        var d=await r.json();
        if(!r.ok||!d.ok) throw new Error(d.error||"Thất bại");
        vdClose();
        if(window.showSnack) showSnack("📝 "+d.message+" (vài phút có bản mới)", d.pipeline_url, false);
      }catch(e){ msg.style.color="#ef4444"; msg.textContent="❌ "+e.message; }
      finally{ gb.disabled=false; }
    };
    window.vdGenLegal=async function(){
      var v=(pin.value||"").trim();
      if(!v){ msg.style.color="#ef4444"; msg.textContent="Nhập PIN để Gen Privacy/Terms."; return; }
      var lb=document.getElementById("vdGenLegalBtn");
      lb.disabled=true; msg.style.color="#64748b"; msg.textContent="⏳ Đang kích gen Privacy/Terms…";
      try{
        var r=await fetch(API+"/api/genlegal",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({app_id:appId,pin:v})});
        var d=await r.json();
        if(!r.ok||!d.ok) throw new Error(d.error||"Thất bại");
        vdClose();
        if(window.showSnack) showSnack("📄 "+d.message, d.pipeline_url, false);
      }catch(e){ msg.style.color="#ef4444"; msg.textContent="❌ "+e.message; }
      finally{ lb.disabled=false; }
    };
  })();</script>

  <script>(function(){
    var API="https://aab.tranquilmind.co";
    window.dlAssets=async function(id,nm,btn){
      var old=btn.innerHTML; btn.disabled=true; btn.innerHTML="⏳ Đang tải asset…";
      try{
        var r=await fetch(API+"/api/assets?app_id="+encodeURIComponent(id));
        if(!r.ok){ var e={}; try{e=await r.json();}catch(_){} throw new Error(e.error||("HTTP "+r.status)); }
        var cnt=r.headers.get("X-Asset-Count")||"";
        var blob=await r.blob();
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");
        a.href=url; a.download=id+"_assets.zip";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function(){URL.revokeObjectURL(url);},4000);
        if(window.showSnack) showSnack("⬇️ Đã tải "+(cnt?cnt+" ":"")+"asset của "+nm,"",false);
      }catch(e){
        if(window.showSnack) showSnack("❌ "+e.message,"",true);
        else alert("Lỗi: "+e.message);
      }finally{ btn.disabled=false; btn.innerHTML=old; }
    };
  })();</script>

  <script>(function(){
    var API="https://aab.tranquilmind.co", appId="";
    function repo(){
      var im=document.querySelector('img[src*="github.com/conmangangqua/"]');
      var m=im&&im.src&&im.src.match(/conmangangqua\/([A-Za-z0-9_-]+)/);
      if(m) return m[1];
      var a=document.querySelector('a[href*="github.com/conmangangqua/"]');
      var m2=a&&a.href.match(/conmangangqua\/([A-Za-z0-9_-]+)/);
      return m2?m2[1]:"";
    }
    window.openStoreModal=async function(id,nm){
      appId=id;
      var appEl=document.getElementById('stApp');
      var urlIn=document.getElementById('stUrl');
      var pinIn=document.getElementById('stPin');
      var msg=document.getElementById('stMsg');
      appEl.textContent=nm+" — dán link store";
      urlIn.value=""; pinIn.value=""; msg.textContent="";
      msg.style.color="#64748b";
      msg.textContent="⏳ Đang dò package…";
      document.getElementById('stOv').classList.add('open');
      try{
        var r=await fetch("https://aab.tranquilmind.co/api/package?app_id="+encodeURIComponent(id));
        var d=await r.json();
        if(d.suggest_url){
          urlIn.value=d.suggest_url;
          if(d.platform==="android"){
            msg.style.color="#16a34a";
            msg.textContent="✓ Auto-suggest từ package: "+d.package_id;
            // Focus end of input so user can edit nếu cần
            setTimeout(function(){ urlIn.focus(); urlIn.setSelectionRange(urlIn.value.length, urlIn.value.length); }, 50);
          } else if(d.platform==="ios"){
            msg.style.color="#7c3aed";
            msg.textContent="🍎 Nhập ID số App Store (bundle: "+(d.package_id||"")+") vào cuối link";
            setTimeout(function(){ urlIn.focus(); urlIn.setSelectionRange(urlIn.value.length, urlIn.value.length); }, 50);
          }
        } else {
          msg.textContent="";
        }
      }catch(e){ msg.textContent=""; }
    };
    window.stClose=function(){ document.getElementById('stOv').classList.remove('open'); };
    document.getElementById('stOv').addEventListener('click',function(e){ if(e.target.id==='stOv') stClose(); });
    window.stSubmit=async function(){
      var url=document.getElementById('stUrl').value.trim(), pin=document.getElementById('stPin').value.trim(), msg=document.getElementById('stMsg'), ok=document.getElementById('stOk');
      if(!url||!pin){ msg.style.color='#ef4444'; msg.textContent='Điền link và PIN.'; return; }
      ok.disabled=true; msg.style.color='#64748b'; msg.textContent='⏳ Đang lưu...';
      try{
        var r=await fetch(API+"/api/store",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({repo:repo(),app_id:appId,url:url,pin:pin})});
        var d=await r.json();
        if(!r.ok||!d.ok) throw new Error(d.error||"Thất bại");
        stClose();
        if(window.showSnack) showSnack("🛒 "+d.message,"",false); else alert(d.message);
      }catch(e){ msg.style.color='#ef4444'; msg.textContent='❌ '+e.message; }
      finally{ ok.disabled=false; }
    };
  })();</script>
  <script>/* SW_ICON_CACHE: cache icon GitHub mãi mãi để không reload mỗi lần mở */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });

  </script>

  <div id="baOv" role="dialog" aria-modal="true">
    <div id="baModal">
      <div id="baHdr">
        <h3 id="baTitle">BA + Tests</h3>
        <button id="baClose" onclick="baClose()" aria-label="Close">✕</button>
      </div>
      <div id="baTabs">
        <button class="ba-tab active" data-file="BA.vi.md">📋 BA (Tiếng Việt)</button>
        <button class="ba-tab" data-file="BA.en.md">📋 BA (English)</button>
        <button class="ba-tab" data-file="TESTCASES.vi.md">✅ Tests (Tiếng Việt)</button>
        <button class="ba-tab" data-file="TESTCASES.en.md">✅ Tests (English)</button>
      </div>
      <div id="baBody"></div>
      <div id="baFt">
        <input id="baPin" type="password" placeholder="PIN để Gen lại" autocomplete="off">
        <button id="baGenBtn" onclick="baGen()"><i data-lucide="sparkles" style="width:14px;height:14px"></i> Gen lại</button>
        <span id="baMsg"></span>
        <a id="baViewLink" href="#" target="_blank" rel="noopener">Xem GitHub →</a>
      </div>
    </div>
  </div>
  <script>(function(){
    // POST /gen → local daemon qua Cloudflare TryTunnel HTTPS (Sonnet 4.6, ~9 phút).
    // Tunnel URL đổi mỗi lần Mac reboot — fetch URL hiện hành từ GitHub raw.
    // GET /api/ba → Vercel cloud (instant từ GitHub raw, không cần Mac on).
    var BA_API_GET = "https://ba-trigger.vercel.app";
    var BA_TUNNEL_INDEX = "https://raw.githubusercontent.com/conmangangqua/app_ba_docs/main/_tunnel.txt";
    var BA_API_GEN_CACHED = null;
    async function resolveBaGen(){
      if (BA_API_GEN_CACHED) return BA_API_GEN_CACHED;
      try {
        var r = await fetch(BA_TUNNEL_INDEX + "?t=" + Date.now(), { cache: "no-store" });
        var t = (await r.text()).trim();
        if (/^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/.test(t)) {
          BA_API_GEN_CACHED = t;
          return t;
        }
        throw new Error("Tunnel URL không hợp lệ: " + t.slice(0,80));
      } catch(e){
        throw new Error("Không lấy được tunnel URL (Mac có đang on?): " + e.message);
      }
    }
    var currentSlug = null;
    var currentName = null;
    var ov = document.getElementById("baOv");
    var body = document.getElementById("baBody");
    var pin = document.getElementById("baPin");
    var msg = document.getElementById("baMsg");
    var gb = document.getElementById("baGenBtn");
    var title = document.getElementById("baTitle");
    var viewLink = document.getElementById("baViewLink");
    var tabs = document.querySelectorAll("#baTabs .ba-tab");

    function escHtml(s){ return String(s||"").replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];}); }

    function renderMd(src){
      var lines = src.split(/\r?\n/);
      var html = [];
      var i = 0, inList = false, listTag = "";
      function closeList(){ if(inList){ html.push("</"+listTag+">"); inList=false; listTag=""; } }
      function inline(t){
        return escHtml(t)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>")
          .replace(/\[([^\]]+)\]\((&lt;)?([^\)\s&]+)(&gt;)?\)/g, '<a href="$3" target="_blank" rel="noopener">$1</a>');
      }
      while(i < lines.length){
        var l = lines[i];
        if(/^\s*\|.+\|\s*$/.test(l) && i+1 < lines.length && /^\s*\|[\s-:|]+\|\s*$/.test(lines[i+1])){
          closeList();
          var headers = l.trim().slice(1,-1).split("|").map(function(s){return s.trim();});
          var tb = ["<table><thead><tr>"];
          headers.forEach(function(h){ tb.push("<th>"+inline(h)+"</th>"); });
          tb.push("</tr></thead><tbody>");
          i += 2;
          while(i < lines.length && /^\s*\|.+\|\s*$/.test(lines[i])){
            var cells = lines[i].trim().slice(1,-1).split("|").map(function(s){return s.trim();});
            tb.push("<tr>"+cells.map(function(c){return "<td>"+inline(c)+"</td>";}).join("")+"</tr>");
            i++;
          }
          tb.push("</tbody></table>");
          html.push(tb.join(""));
          continue;
        }
        var m;
        if((m=l.match(/^#\s+(.*)/))){ closeList(); html.push("<h1>"+inline(m[1])+"</h1>"); }
        else if((m=l.match(/^##\s+(.*)/))){ closeList(); html.push("<h2>"+inline(m[1])+"</h2>"); }
        else if((m=l.match(/^###\s+(.*)/))){ closeList(); html.push("<h3>"+inline(m[1])+"</h3>"); }
        else if((m=l.match(/^>\s?(.*)/))){ closeList(); html.push("<blockquote>"+inline(m[1])+"</blockquote>"); }
        else if((m=l.match(/^\s*-\s+\[[ x]\]\s+(.*)/))){
          if(!inList || listTag!=="ul"){ closeList(); html.push("<ul>"); inList=true; listTag="ul"; }
          var checked = l.indexOf("[x]")>=0;
          html.push("<li><input type='checkbox' "+(checked?"checked":"")+" disabled> "+inline(m[1])+"</li>");
        }
        else if((m=l.match(/^\s*-\s+(.*)/))){
          if(!inList || listTag!=="ul"){ closeList(); html.push("<ul>"); inList=true; listTag="ul"; }
          html.push("<li>"+inline(m[1])+"</li>");
        }
        else if((m=l.match(/^\s*\d+\.\s+(.*)/))){
          if(!inList || listTag!=="ol"){ closeList(); html.push("<ol>"); inList=true; listTag="ol"; }
          html.push("<li>"+inline(m[1])+"</li>");
        }
        else if(l.trim()===""){ closeList(); html.push(""); }
        else if(l.trim()==="---"){ closeList(); html.push("<hr>"); }
        else { closeList(); html.push("<p>"+inline(l)+"</p>"); }
        i++;
      }
      closeList();
      return html.join("\n");
    }

    function activateTab(file){
      tabs.forEach(function(t){ t.classList.toggle("active", t.dataset.file===file); });
      loadFile(file);
    }

    async function loadFile(file){
      body.innerHTML = '<div class="ba-spin"></div>';
      msg.textContent = "";
      try {
        var r = await fetch(BA_API_GET+"/api/ba?app_id="+encodeURIComponent(currentSlug)+"&file="+encodeURIComponent(file));
        var d = await r.json();
        if(!d.ok) throw new Error(d.error||"HTTP "+r.status);
        if(!d.exists){
          body.innerHTML = '<div class="ba-empty"><h3>Chưa có '+escHtml(file)+'</h3><p>Bấm <b>Gen lại</b> (cần PIN) để tạo bộ doc đầu tiên.</p></div>';
          viewLink.style.display = "none";
          return;
        }
        viewLink.href = d.view_url;
        viewLink.style.display = "block";
        body.innerHTML = renderMd(d.content);
      } catch(e){
        body.innerHTML = '<div class="ba-empty"><h3>Lỗi tải</h3><p>'+escHtml(e.message)+'</p></div>';
      }
    }

    window.genBaDocs = function(id, nm){
      currentSlug = id;
      currentName = nm;
      title.textContent = nm + " — BA + Tests";
      pin.value = "";
      msg.textContent = "";
      gb.disabled = false;
      viewLink.style.display = "none";
      ov.classList.add("open");
      activateTab("BA.vi.md");
    };

    window.baClose = function(){ ov.classList.remove("open"); };

    window.baGen = async function(){
      var v = (pin.value||"").trim();
      if(!v){ msg.style.color="#dc2626"; msg.textContent="Nhập PIN để Gen lại."; return; }
      gb.disabled = true;
      msg.style.color="#64748b";
      msg.textContent = "⏳ Đang gen (~8-12 phút, Claude Sonnet 4.6 qua local daemon)…";
      try {
        var gen = await resolveBaGen();
        var r = await fetch(gen+"/gen", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ slug: currentSlug, pin: v })
        });
        var d = await r.json();
        if(!r.ok || !d.ok) throw new Error(d.error||("HTTP "+r.status));
        msg.style.color="#059669";
        msg.textContent = "✅ Gen OK ("+d.duration_sec+"s)";
        viewLink.href = d.result_url;
        viewLink.style.display = "block";
        var activeTab = document.querySelector("#baTabs .ba-tab.active");
        if(activeTab) loadFile(activeTab.dataset.file);
      } catch(e){
        msg.style.color="#dc2626";
        msg.textContent = "❌ "+e.message.slice(0,160);
      } finally {
        gb.disabled = false;
      }
    };

    tabs.forEach(function(t){
      t.addEventListener("click", function(){ activateTab(t.dataset.file); });
    });

    ov.addEventListener("click", function(e){ if(e.target===ov) baClose(); });
    document.addEventListener("keydown", function(e){ if(e.key==="Escape" && ov.classList.contains("open")) baClose(); });
  })();</script>
