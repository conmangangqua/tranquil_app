<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Hub - tranquil-tmt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    .header p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.9);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px;
      padding: 20px;
    }

    .app-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .app-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    .platform-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
    }

    .platform-badge.android {
      background: linear-gradient(135deg, #3ddc84, #2bb673);
      color: white;
    }

    .platform-badge.ios {
      background: linear-gradient(135deg, #007aff, #5856d6);
      color: white;
    }

    .app-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #333;
      text-align: center;
    }

    .app-description {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
      text-align: center;
    }

    .app-features {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .feature-tag {
      padding: 5px 12px;
      background: rgba(0, 122, 255, 0.1);
      color: #007aff;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .install-button {
      display: block;
      width: 100%;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #007aff, #5856d6);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
      transition: all 0.3s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .install-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0, 122, 255, 0.4);
    }

    .install-button.dev {
      background: linear-gradient(135deg, #ff9500, #ff6b35);
      box-shadow: 0 8px 20px rgba(255, 149, 0, 0.3);
    }

    .install-button.live {
      background: linear-gradient(135deg, #34c759, #30d158);
      box-shadow: 0 8px 20px rgba(52, 199, 89, 0.3);
    }

    .install-button.aab {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .button-group .install-button {
      flex: 1;
      margin-bottom: 0;
      min-width: 80px;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .button-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📱 Danh sách ứng dụng</h1>
    <p>Chọn và cài đặt ứng dụng bạn muốn sử dụng</p>
  </div>

  <div class="container" id="appContainer"></div>

  <script>
    fetch("apps.json")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("appContainer");
        data.apps.forEach(app => {
          const features = (app.features || []).map(f => `<span class="feature-tag">${f}</span>`).join("");
          const platformStr = app.platform || "Android";
          const platformClass = platformStr.toLowerCase().includes("ios") ? "ios" : "android";
          const isIOS = platformClass === "ios";
          
          const devUrl = app.downloads?.dev || "";
          const prodUrl = app.downloads?.prod || "";
          
          const html = `
            <div class="app-card">
              <div class="app-icon">
                <img src="${app.icon}" alt="${app.name}" onerror="this.style.display='none'">
              </div>
              <span class="platform-badge ${platformClass}">${platformStr}</span>
              <h2 class="app-title">${app.name}</h2>
              <p class="app-description">${app.description || ""}</p>
              ${features ? `<div class="app-features">${features}</div>` : ""}
              <div class="button-group">
                ${devUrl ? `<a class="install-button dev" href="${isIOS ? 'itms-services://?action=download-manifest&url=' + devUrl : devUrl}">🔧 Dev</a>` : ""}
                ${prodUrl ? `<a class="install-button live" href="${isIOS ? 'itms-services://?action=download-manifest&url=' + prodUrl : prodUrl}">🚀 Live</a>` : ""}
                ${app.downloads?.aab ? `<a class="install-button aab" href="${app.downloads.aab}">📦 AAB</a>` : ""}
              </div>
            </div>
          `;
          container.insertAdjacentHTML("beforeend", html);
        });
      });
  </script>
</body>
</html>
