name: Update apps.json on release

on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty to use latest release)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-apps-json:
    runs-on: ubuntu-latest

    steps:
      # ===================== CHECKOUT =====================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout default branch
        run: |
          DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@' || echo "main")
          git checkout $DEFAULT_BRANCH || git checkout main || git checkout master

      # ===================== SETUP TOOLS =====================
      - name: Setup jq and GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install gh -y
          fi
          gh --version
          echo "GitHub CLI installed successfully"

      # ===================== EXTRACT RELEASE INFO =====================
      - name: Extract release info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          echo "Event name: $EVENT_NAME"
          echo "REPO=${{ github.repository }}" >> $GITHUB_ENV
          
          if [ "$EVENT_NAME" = "release" ]; then
            # Trigger từ release event
            echo "Using release event data"
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=${{ github.event.release.name }}" >> $GITHUB_ENV
          else
            # Trigger từ workflow_dispatch (chạy thủ công)
            RELEASE_TAG="${{ inputs.release_tag }}"
            if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "" ]; then
              echo "Fetching specific release: $RELEASE_TAG"
              RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/tags/$RELEASE_TAG --jq '{tag_name: .tag_name, name: .name}')
            else
              echo "Fetching latest release via API"
              RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/latest --jq '{tag_name: .tag_name, name: .name}')
            fi
            
            echo "Release data: $RELEASE_DATA"
            TAG_NAME=$(echo "$RELEASE_DATA" | jq -r '.tag_name // empty')
            RELEASE_NAME=$(echo "$RELEASE_DATA" | jq -r '.name // empty')
            echo "TAG=$TAG_NAME" >> $GITHUB_ENV
            echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
            echo "Extracted TAG: $TAG_NAME, RELEASE_NAME: $RELEASE_NAME"
          fi

      # ===================== PARSE RELEASE ASSETS =====================
      - name: Parse release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          
          if [ "$EVENT_NAME" = "release" ]; then
            # Trigger từ release event - dùng data từ event
            echo "Using release event assets"
            ASSETS='${{ toJson(github.event.release.assets) }}'
            DEV_URL=$(echo "$ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_dev\\.apk$")) | .browser_download_url // empty else empty end')
            PROD_URL=$(echo "$ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_prod\\.apk$")) | .browser_download_url // empty else empty end')
            AAB_URL=$(echo "$ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("\\.aab$")) | .browser_download_url // empty else empty end')
            ICON_URL=$(echo "$ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_icon\\.png$")) | .browser_download_url // empty else empty end')
          else
            # Trigger từ workflow_dispatch - tổng hợp từ tất cả releases (dev, prod, aab)
            echo "Fetching assets from all releases (dev, prod, aab)..."
            
            # Fetch từ release 'dev'
            echo "Fetching from 'dev' release..."
            DEV_ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/dev --jq '.assets' 2>/dev/null || echo "[]")
            DEV_URL=$(echo "$DEV_ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_dev\\.apk$")) | .browser_download_url // empty else empty end')
            DEV_ICON=$(echo "$DEV_ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_icon\\.png$")) | .browser_download_url // empty else empty end')
            
            # Fetch từ release 'prod'
            echo "Fetching from 'prod' release..."
            PROD_ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/prod --jq '.assets' 2>/dev/null || echo "[]")
            PROD_URL=$(echo "$PROD_ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_prod\\.apk$")) | .browser_download_url // empty else empty end')
            PROD_ICON=$(echo "$PROD_ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("_icon\\.png$")) | .browser_download_url // empty else empty end')
            
            # Fetch từ release 'aab'
            echo "Fetching from 'aab' release..."
            AAB_ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/aab --jq '.assets' 2>/dev/null || echo "[]")
            AAB_URL=$(echo "$AAB_ASSETS" | jq -r 'if type == "array" then .[] | select(.name | test("\\.aab$")) | .browser_download_url // empty else empty end')
            
            # Ưu tiên icon từ prod, nếu không có thì lấy từ dev
            ICON_URL="$PROD_ICON"
            if [ -z "$ICON_URL" ] || [ "$ICON_URL" = "" ]; then
              ICON_URL="$DEV_ICON"
            fi
            
            echo "Found URLs - DEV: ${DEV_URL:-none}, PROD: ${PROD_URL:-none}, AAB: ${AAB_URL:-none}, ICON: ${ICON_URL:-none}"
          fi

          # Use delimiter to safely set environment variables with URLs
          {
            echo "DEV_URL<<EOF"
            echo "$DEV_URL"
            echo "EOF"
          } >> $GITHUB_ENV
          
          {
            echo "PROD_URL<<EOF"
            echo "$PROD_URL"
            echo "EOF"
          } >> $GITHUB_ENV
          
          {
            echo "AAB_URL<<EOF"
            echo "$AAB_URL"
            echo "EOF"
          } >> $GITHUB_ENV
          
          {
            echo "ICON_URL<<EOF"
            echo "$ICON_URL"
            echo "EOF"
          } >> $GITHUB_ENV

      # ===================== PREPARE apps.json =====================
      - name: Ensure apps.json exists
        run: |
          if [ ! -f apps.json ]; then
            echo '{ "apps": [] }' > apps.json
          fi

      # ===================== UPDATE apps.json =====================
      - name: Update apps.json
        run: |
          APP_ID=$(echo "$REPO" | cut -d'/' -f2)
          APP_NAME=$(echo "$RELEASE_NAME" | sed 's/Android //g')

          jq \
            --arg id "$APP_ID" \
            --arg name "$APP_NAME" \
            --arg dev "$DEV_URL" \
            --arg prod "$PROD_URL" \
            --arg aab "$AAB_URL" \
            --arg icon "$ICON_URL" \
            '
            .apps |=
              (
                if any(.[]; .id == $id) then
                  map(
                    if .id == $id then
                      .downloads = {
                        dev: (if $dev != "" then $dev else .downloads.dev // empty end),
                        prod: (if $prod != "" then $prod else .downloads.prod // empty end),
                        aab: (if $aab != "" then $aab else .downloads.aab // empty end)
                      }
                      | .icon = (if $icon != "" then $icon else .icon // empty end)
                      | .name = $name
                    else .
                    end
                  )
                else
                  . + [{
                    id: $id,
                    name: $name,
                    icon: (if $icon != "" then $icon else "" end),
                    platform: "Android",
                    description: "",
                    features: [],
                    downloads: {
                      dev: (if $dev != "" then $dev else empty end),
                      prod: (if $prod != "" then $prod else empty end),
                      aab: (if $aab != "" then $aab else empty end)
                    }
                  }]
                end
              )
            ' apps.json > apps.tmp.json

          mv apps.tmp.json apps.json

      # ===================== COMMIT & PUSH =====================
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update apps.json for ${TAG:-latest release}"
          git push
