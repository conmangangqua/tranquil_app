name: Update apps.json on release

on:
  release:
    types: [published, released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-apps-json:
    runs-on: ubuntu-latest

    steps:
      # ===================== CHECKOUT =====================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout default branch
        run: |
          DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@' || echo "main")
          git checkout $DEFAULT_BRANCH || git checkout main || git checkout master

      # ===================== SETUP TOOLS =====================
      - name: Setup jq and GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          type -p gh >/dev/null || (
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
            && chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && apt-get update \
            && apt-get install gh -y
          )

      # ===================== EXTRACT RELEASE INFO =====================
      - name: Extract release info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "REPO=${{ github.repository }}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=${{ github.event.release.name }}" >> $GITHUB_ENV
          else
            # For workflow_dispatch, get latest release
            LATEST_RELEASE=$(gh api repos/${{ github.repository }}/releases/latest --jq '{tag_name: .tag_name, name: .name}')
            echo "TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')" >> $GITHUB_ENV
            echo "RELEASE_NAME=$(echo "$LATEST_RELEASE" | jq -r '.name')" >> $GITHUB_ENV
          fi

      # ===================== PARSE RELEASE ASSETS =====================
      - name: Parse release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            ASSETS='${{ toJson(github.event.release.assets) }}'
          else
            # For workflow_dispatch, fetch latest release assets
            ASSETS=$(gh api repos/${{ github.repository }}/releases/latest --jq '.assets')
          fi

          DEV_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("_dev\\.apk$")) | .browser_download_url // empty')
          PROD_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("_prod\\.apk$")) | .browser_download_url // empty')
          AAB_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.aab$")) | .browser_download_url // empty')
          ICON_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("_icon\\.png$")) | .browser_download_url // empty')

          echo "DEV_URL=$DEV_URL" >> $GITHUB_ENV
          echo "PROD_URL=$PROD_URL" >> $GITHUB_ENV
          echo "AAB_URL=$AAB_URL" >> $GITHUB_ENV
          echo "ICON_URL=$ICON_URL" >> $GITHUB_ENV

      # ===================== PREPARE apps.json =====================
      - name: Ensure apps.json exists
        run: |
          if [ ! -f apps.json ]; then
            echo '{ "apps": [] }' > apps.json
          fi

      # ===================== UPDATE apps.json =====================
      - name: Update apps.json
        run: |
          APP_ID=$(echo "$REPO" | cut -d'/' -f2)
          APP_NAME=$(echo "$RELEASE_NAME" | sed 's/Android //g')

          jq \
            --arg id "$APP_ID" \
            --arg name "$APP_NAME" \
            --arg dev "$DEV_URL" \
            --arg prod "$PROD_URL" \
            --arg aab "$AAB_URL" \
            --arg icon "$ICON_URL" \
            '
            .apps |=
              (
                if any(.[]; .id == $id) then
                  map(
                    if .id == $id then
                      .downloads = {
                        dev: (if $dev != "" then $dev else .downloads.dev // empty end),
                        prod: (if $prod != "" then $prod else .downloads.prod // empty end),
                        aab: (if $aab != "" then $aab else .downloads.aab // empty end)
                      }
                      | .icon = (if $icon != "" then $icon else .icon // empty end)
                      | .name = $name
                    else .
                    end
                  )
                else
                  . + [{
                    id: $id,
                    name: $name,
                    icon: (if $icon != "" then $icon else "" end),
                    platform: "Android",
                    description: "",
                    features: [],
                    downloads: {
                      dev: (if $dev != "" then $dev else empty end),
                      prod: (if $prod != "" then $prod else empty end),
                      aab: (if $aab != "" then $aab else empty end)
                    }
                  }]
                end
              )
            ' apps.json > apps.tmp.json

          mv apps.tmp.json apps.json

      # ===================== COMMIT & PUSH =====================
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update apps.json for ${TAG:-latest release}"
          git push
