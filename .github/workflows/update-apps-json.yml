name: Update apps.json on release

on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty to use latest release)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-apps-json:
    runs-on: ubuntu-latest

    steps:
      # ===================== CHECKOUT =====================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout default branch
        run: |
          DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@' || echo "main")
          git checkout $DEFAULT_BRANCH || git checkout main || git checkout master

      # ===================== SETUP TOOLS =====================
      - name: Setup jq and GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install gh -y
          fi
          gh --version
          echo "GitHub CLI installed successfully"

      # ===================== EXTRACT RELEASE INFO =====================
      - name: Extract release info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          echo "Event name: $EVENT_NAME"
          echo "REPO=${{ github.repository }}" >> $GITHUB_ENV
          
          if [ "$EVENT_NAME" = "release" ]; then
            # Trigger từ release event
            echo "Using release event data"
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=${{ github.event.release.name }}" >> $GITHUB_ENV
          else
            # Trigger từ workflow_dispatch (chạy thủ công)
            RELEASE_TAG="${{ inputs.release_tag }}"
            if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "" ]; then
              echo "Fetching specific release: $RELEASE_TAG"
              RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/tags/$RELEASE_TAG --jq '{tag_name: .tag_name, name: .name}')
            else
              echo "Fetching latest release via API"
              RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/latest --jq '{tag_name: .tag_name, name: .name}')
            fi
            
            echo "Release data: $RELEASE_DATA"
            TAG_NAME=$(echo "$RELEASE_DATA" | jq -r '.tag_name // empty')
            RELEASE_NAME=$(echo "$RELEASE_DATA" | jq -r '.name // empty')
            echo "TAG=$TAG_NAME" >> $GITHUB_ENV
            echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
            echo "Extracted TAG: $TAG_NAME, RELEASE_NAME: $RELEASE_NAME"
          fi

      # ===================== PARSE RELEASE ASSETS =====================
      - name: Parse release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          
          if [ "$EVENT_NAME" = "release" ]; then
            # Trigger từ release event - dùng data từ event
            echo "Using release event assets"
            ASSETS='${{ toJson(github.event.release.assets) }}'
            echo "$ASSETS" > /tmp/all_assets.json
          else
            # Trigger từ workflow_dispatch - tổng hợp từ tất cả releases (dev, prod, aab)
            echo "Fetching assets from all releases (dev, prod, aab)..."
            
            # Fetch từ release 'dev'
            echo "Fetching from 'dev' release..."
            DEV_ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/dev --jq '.assets' 2>/dev/null || echo "[]")
            
            # Fetch từ release 'prod'
            echo "Fetching from 'prod' release..."
            PROD_ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/prod --jq '.assets' 2>/dev/null || echo "[]")
            
            # Fetch từ release 'aab'
            echo "Fetching from 'aab' release..."
            AAB_ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/aab --jq '.assets' 2>/dev/null || echo "[]")
            
            # Combine all assets
            ALL_ASSETS=$(echo "[$DEV_ASSETS, $PROD_ASSETS, $AAB_ASSETS]" | jq 'flatten | unique_by(.id)')
            echo "$ALL_ASSETS" > /tmp/all_assets.json
          fi

      # ===================== PREPARE apps.json =====================
      - name: Ensure apps.json exists
        run: |
          if [ ! -f apps.json ]; then
            echo '{ "apps": [] }' > apps.json
          fi

      # ===================== UPDATE apps.json =====================
      - name: Update apps.json
        run: |
          # Read all assets
          ALL_ASSETS=$(cat /tmp/all_assets.json)
          
          # Extract all app IDs from file names (_dev.apk, _prod.apk, .aab, _icon.png)
          APP_IDS=$(echo "$ALL_ASSETS" | jq -r '.[] | .name | 
            if test("_dev\\.apk$") then 
              gsub("_dev\\.apk$"; "") 
            elif test("_prod\\.apk$") then 
              gsub("_prod\\.apk$"; "") 
            elif test("\\.aab$") then 
              gsub("\\.aab$"; "") 
            elif test("_icon\\.png$") then 
              gsub("_icon\\.png$"; "") 
            else 
              empty 
            end' | sort -u)
          
          echo "Found app IDs:"
          echo "$APP_IDS"
          
          # Process each app
          for APP_ID in $APP_IDS; do
            echo "Processing app: $APP_ID"
            
            # Find URLs for this app
            DEV_URL=$(echo "$ALL_ASSETS" | jq -r ".[] | select(.name | test(\"^${APP_ID}_dev\\.apk$\")) | .browser_download_url // empty" | head -n 1)
            PROD_URL=$(echo "$ALL_ASSETS" | jq -r ".[] | select(.name | test(\"^${APP_ID}_prod\\.apk$\")) | .browser_download_url // empty" | head -n 1)
            AAB_URL=$(echo "$ALL_ASSETS" | jq -r ".[] | select(.name | test(\"^${APP_ID}\\.aab$\")) | .browser_download_url // empty" | head -n 1)
            ICON_URL=$(echo "$ALL_ASSETS" | jq -r ".[] | select(.name | test(\"^${APP_ID}_icon\\.png$\")) | .browser_download_url // empty" | head -n 1)
            
            # Format app name from app_id (video_downloader -> Video Downloader, photo_ai -> Photo AI)
            APP_NAME=$(echo "$APP_ID" | sed 's/_/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
            
            echo "  DEV: ${DEV_URL:-none}"
            echo "  PROD: ${PROD_URL:-none}"
            echo "  AAB: ${AAB_URL:-none}"
            echo "  ICON: ${ICON_URL:-none}"
            
            # Update apps.json for this app
            jq \
              --arg id "$APP_ID" \
              --arg name "$APP_NAME" \
              --arg dev "$DEV_URL" \
              --arg prod "$PROD_URL" \
              --arg aab "$AAB_URL" \
              --arg icon "$ICON_URL" \
              '
              .apps |=
                (
                  if any(.[]; .id == $id) then
                    map(
                      if .id == $id then
                        .downloads = {
                          dev: (if $dev != "" then $dev else (.downloads.dev // empty) end),
                          prod: (if $prod != "" then $prod else (.downloads.prod // empty) end),
                          aab: (if $aab != "" then $aab else (.downloads.aab // empty) end)
                        }
                        | .icon = (if $icon != "" then $icon else (.icon // empty) end)
                        | .name = (if .name != "" then .name else $name end)
                      else .
                      end
                    )
                  else
                    . + [{
                      id: $id,
                      name: $name,
                      icon: (if $icon != "" then $icon else "" end),
                      platform: "Android",
                      description: "",
                      features: [],
                      downloads: {
                        dev: (if $dev != "" then $dev else empty end),
                        prod: (if $prod != "" then $prod else empty end),
                        aab: (if $aab != "" then $aab else empty end)
                      }
                    }]
                  end
                )
              ' apps.json > apps.tmp.json
            
            mv apps.tmp.json apps.json
          done
          
          echo "Updated apps.json with all apps"

      # ===================== COMMIT & PUSH =====================
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update apps.json for ${TAG:-latest release}"
          git push
